services:

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:80"     
      - "443:443"     
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
      - ./frontend/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./frontend/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

  printer:
    build: ./printer
    ports:
      - "8000:8000"
    environment:
      - DEVICE_PRINTER=/dev/usb/lp0
    restart: unless-stopped
    volumes:
      - ./printer:/app
      - /app/node_modules
    privileged: true
    devices:
      - "/dev/usb/lp0:/dev/usb/lp0"
    
  backend:
    build: ./backend
    ports:
      - "4000:4000"     
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000           
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/mydb
      - FRONTEND_URL=http://frontend
      - PRINTER_URL=http://printer:8000/imprimir
      - DEVICE_PRINTER=lp0
    command: npm run dev    
    depends_on:
      - postgres
      - printer
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine   
    ports:
      - "5433:5432"            
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  
networks:
  default:
    name: inventory-network