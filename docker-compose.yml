services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "5173:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frontend/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./frontend/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
    depends_on:
      - backend
    restart: unless-stopped
  printer:
    build: ./printer
    ports:
      - "8000:8000"
    environment:
      - DEVICE_PRINTER=/dev/usb/lp0
    restart: unless-stopped
    privileged: true

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - public:/app/public:Z
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - BACKEND_PORT=${BACKEND_PORT}
      - IP_LOCALHOST=${IP_LOCALHOST}
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/mydb
      - FRONTEND_URL=${FRONTEND_URL}
      - PRINTER_URL=${PRINTER_URL}
      - DEVICE_PRINTER=${DEVICE_PRINTER}
    depends_on:
      - postgres
      - printer
    restart: unless-stopped

  bot:
    build: ./bot
    volumes:
      - ./bot:/app
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - TOKEN=${TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      - BACKEND_URL=${BACKEND_URL}
      - VERIFY_SSL=${VERIFY_SSL}
      - ZONA_HORARIA=${ZONA_HORARIA}
      - PRINTER_URL=${PRINTER_URL}
    depends_on:
      - backend
      - printer
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db.sql:/docker-entrypoint-initdb.d/db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    external: true
    name: inventory-manager_postgres_data
  public:
    external: true
    name: inventory-manager_public

networks:
  default:
    name: inventory-network
