services:

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://localhost:3000/api/
    ports:
      - "5173:80"     
      - "443:443"     
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
      - ./frontend/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./frontend/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3000:3000"     
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000           
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/mydb
      - FRONTEND_URL=https://frontend
    command: npm run dev    
    depends_on:
      - postgres

  postgres:
    image: postgres:18-alpine   
    ports:
      - "5433:5432"            
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  
networks:
  default:
    name: inventory-network