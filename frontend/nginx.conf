server {
    listen 80;
    server_name localhost;

    # Redirige cualquier petición HTTP → HTTPS
    return 301 https://$host$request_uri;
}

# Bloque HTTPS: sirve la SPA + proxy al backend
server {
    listen 443 ssl http2;
    server_name localhost;

    # Certificados
    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Configuración TLS
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Opcional: activa HSTS cuando estés seguro de que todo funciona
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Sirve siempre la SPA (index.html)
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el backend (API en /api/)
    location /api/ {
        proxy_pass                  http://backend:3000/;

        # Cabeceras importantes para que el backend vea la IP real y el protocolo
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;

      }

    # Opcional: página de error personalizada
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}